apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-agent
  namespace: default
  labels:
    app: llm-agent
    version: v1
spec:
  replicas: 2
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 900
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-agent
  template:
    metadata:
      labels:
        app: llm-agent
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # GPU monitoring annotations
        nvidia.com/gpu-memory: "16Gi"
        nvidia.com/gpu-count: "1"
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - llm-agent
              topologyKey: kubernetes.io/hostname
        # Prefer nodes with higher GPU compute capability
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.compute.major
                operator: In
                values: ["8", "9"]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: llm-agent
      initContainers:
      - name: model-warmup
        image: your-registry/llm-agent:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args:
        - -c
        - |
          echo "Starting model warmup..."
          python warmup.py --model-path "${MODEL_PATH}" --warmup-requests 5
          echo "Warmup complete"
        env:
        - name: MODEL_PATH
          value: "/models/your-model"
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: 2000m
            memory: 8Gi
          limits:
            nvidia.com/gpu: 1
            cpu: 4000m
            memory: 16Gi
        volumeMounts:
        - name: model-storage
          mountPath: /models
          readOnly: true
        - name: cache-storage
          mountPath: /cache
        - name: tmp-storage
          mountPath: /tmp
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      containers:
      - name: llm-agent
        image: your-registry/llm-agent:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: 2000m
            memory: 8Gi
            ephemeral-storage: 10Gi
          limits:
            nvidia.com/gpu: 1
            cpu: 4000m
            memory: 16Gi
            ephemeral-storage: 20Gi
        env:
        - name: MODEL_PATH
          value: "/models/your-model"
        - name: MAX_BATCH_SIZE
          value: "8"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: NVIDIA_REQUIRE_CUDA
          value: "cuda>=11.8"
        - name: MAX_CONCURRENT_REQUESTS
          value: "32"
        - name: MODEL_CACHE_SIZE
          value: "4096"
        - name: PROMETHEUS_PORT
          value: "9090"
        - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
          value: "100"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "max_split_size_mb:512"
        - name: TRANSFORMERS_CACHE
          value: "/cache/transformers"
        - name: HF_HOME
          value: "/cache/huggingface"
        - name: TMPDIR
          value: "/tmp"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60  # model loading takes time even after warmup initContainer
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 2      # require 2 consecutive passes — avoids flapping under load
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        volumeMounts:
        - name: model-storage
          mountPath: /models
          readOnly: true
        - name: cache-storage
          mountPath: /cache
        - name: tmp-storage
          mountPath: /tmp
        - name: shm
          mountPath: /dev/shm
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
      - name: cache-storage
        emptyDir:
          sizeLimit: 5Gi
      - name: tmp-storage
        emptyDir:
          sizeLimit: 2Gi
      - name: shm
        emptyDir:
          sizeLimit: 1Gi
          medium: Memory
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: workload-type
        operator: Equal
        value: "ml-inference"
        effect: NoSchedule
      - key: node.kubernetes.io/instance-type
        operator: Equal
        value: gpu-instance
        effect: NoSchedule
      - key: nvidia.com/gpu.present
        operator: Equal
        value: "true"
        effect: NoSchedule
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: llm-agent-service
  namespace: default
  labels:
    app: llm-agent
spec:
  selector:
    app: llm-agent
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 1-hour stickiness; complements Ingress cookie affinity

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-agent-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llm-agent

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: default
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llm-agent-monitor
  namespace: default
  labels:
    app: llm-agent
    release: prometheus
spec:
  selector:
    matchLabels:
      app: llm-agent
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
    honorLabels: true

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-quota
  namespace: default
  labels:
    app: llm-agent
spec:
  hard:
    requests.nvidia.com/gpu: "${GPU_QUOTA_MAX}"
    limits.nvidia.com/gpu: "${GPU_QUOTA_MAX}"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-agent-ingress
  namespace: default
  labels:
    app: llm-agent
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "llm-session"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$cookie_llm_session"
    nginx.ingress.kubernetes.io/server-snippet: |
      location /warmup {
        access_log off;
        return 200 "OK";
      }
spec:
  ingressClassName: nginx
  rules:
  - host: llm-api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: llm-agent-service
            port:
              number: 80
